sonar.projectKey=daler91_IowaGrants
sonar.organization=daler91

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=IowaGrants
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude generated / vendored paths from scanning
sonar.exclusions=src/app/fonts/**,prisma/generated/**

# The scraper orchestration, PDF/AI helpers, scraper regex-heavy
# parsers, and the middleware matcher regex legitimately use pattern
# matching and dynamic URL handling. Each has been reviewed; suppress
# the corresponding hotspots so the quality gate is meaningful for
# genuinely new risk.
sonar.issue.ignore.multicriteria=r1,r2,r3,r4,r5
sonar.issue.ignore.multicriteria.r1.ruleKey=typescript:S4784
sonar.issue.ignore.multicriteria.r1.resourceKey=src/lib/**/*.ts
sonar.issue.ignore.multicriteria.r2.ruleKey=typescript:S5852
sonar.issue.ignore.multicriteria.r2.resourceKey=src/lib/**/*.ts
sonar.issue.ignore.multicriteria.r3.ruleKey=typescript:S5144
sonar.issue.ignore.multicriteria.r3.resourceKey=src/lib/http/url-validation.ts
sonar.issue.ignore.multicriteria.r4.ruleKey=typescript:S6790
sonar.issue.ignore.multicriteria.r4.resourceKey=src/middleware.ts
sonar.issue.ignore.multicriteria.r5.ruleKey=typescript:S2077
sonar.issue.ignore.multicriteria.r5.resourceKey=src/**/*.ts
